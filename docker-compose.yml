services:
  mongo:
    image: mongo:${MONGO_TAG:-7.0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    build:
      context: ./compose/opensearch
      args:
        OPENSEARCH_TAG: ${OPENSEARCH_TAG:-2.17.1}
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m -Dopensearch.allow_insecure_settings=true"
      - path.repo=/usr/share/opensearch/snapshots
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped
    ports:
      - "9200:9200"
    volumes:
      - ./compose/os_snapshots:/usr/share/opensearch/snapshots
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  graylog:
    image: graylog/graylog:${GRAYLOG_VERSION:-6.0}
    depends_on:
      mongo:
        condition: service_started
      opensearch:
        condition: service_healthy
    environment:
      - GRAYLOG_NODE_ID_FILE=/usr/share/graylog/data/config/node-id
      - GRAYLOG_PASSWORD_SECRET=somepasswordpepperchangeme
      - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918 # admin
      - GRAYLOG_HTTP_EXTERNAL_URI=http://127.0.0.1:9000/
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
      - GRAYLOG_SERVER_JAVA_OPTS=-Xms512m -Xmx512m
      # Enable email transport to allow creating email notifications in tests
      - GRAYLOG_TRANSPORT_EMAIL_ENABLED=true
      - GRAYLOG_TRANSPORT_EMAIL_HOSTNAME=localhost
      - GRAYLOG_TRANSPORT_EMAIL_PORT=25
      - GRAYLOG_TRANSPORT_EMAIL_FROM_EMAIL=graylog@example.com
    ports:
      - "9000:9000"   # Web UI + REST API (/api)
      - "12201:12201" # GELF UDP
      - "12201:12201/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9000/api/system | grep -qE '^(200|401)$'"]
      interval: 10s
      timeout: 5s
      retries: 30

  # S3-compatible storage for OpenSearch snapshot repository tests
  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000" # S3 API (avoid conflict with Graylog 9000)
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MC_HOST_alias=http://minioadmin:minioadmin@minio:9000
    entrypoint: /bin/sh
    command: -c "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb -p local/tf-snapshots || true && mc anonymous set download local/tf-snapshots || true"

  # OpenLDAP for LDAP data source tests (dev-only)
  openldap:
    build:
      context: ./compose/openldap
    environment:
      - LDAP_ORGANISATION=Example Org
      - LDAP_DOMAIN=example.org
      - LDAP_ADMIN_PASSWORD=admin
    ports:
      - "1389:389"

volumes:
  os_snapshots:
  minio_data:
